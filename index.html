<head>

    <style>
        :root {
            --cream: #FFF9EC;
            --peach: #FFE4C4;
            --pink: #FF8FAB;
            --pink-dark: #E85D75;
            --yellow: #FFD93D;
            --yellow-dark: #F4B400;
            --blue: #6DC1F7;
            --blue-dark: #3498DB;
            --green: #95E1A4;
            --green-dark: #4CAF50;
            --purple: #C3A6FF;
            --purple-dark: #8B5CF6;
            --orange: #FFAA5A;
            --orange-dark: #FF7A45;
            --coral: #FF6B9D;
            --mint: #7ED6B0;
        }
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 600;
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 217, 61, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 143, 171, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(109, 193, 247, 0.08) 0%, transparent 50%),
                #FFF9EC;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        /* Be Vietnam Pro cho tiêu đề - font được thiết kế riêng cho tiếng Việt,
           hiển thị dấu (ă, â, ê, ô, ơ, ư, đ) cân đối tuyệt đối */
        .display-font {
            font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 800;
            letter-spacing: -0.01em;
        }
        .brand-font {
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        /* Riêng các ký tự chữ cái đơn lẻ (A, B, C...) dùng Be Vietnam Pro đậm nét để dạy bé */
        .letter-font {
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 900;
        }
        .chunky-shadow { box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 12px 24px rgba(0,0,0,0.08); }
        .chunky-shadow-sm { box-shadow: 0 4px 0 rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.08); }
        .btn-3d {
            border-bottom-width: 6px;
            transition: all 0.12s ease;
        }
        .btn-3d:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-8px, 0) rotate(-2deg); }
            75% { transform: translate(8px, 0) rotate(2deg); }
        }
        .shake { animation: shake 0.35s ease-in-out; }

        @keyframes pop {
            0% { transform: scale(0.7); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes wobble {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        .wobble { animation: wobble 2s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .float { animation: float 3s ease-in-out infinite; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slideUp 0.5s ease-out backwards; }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin-slow { animation: spin-slow 12s linear infinite; }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
        }
        .sparkle { animation: sparkle 2s ease-in-out infinite; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--cream); }
        ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; border: 3px solid var(--cream); }

        /* Dotted background */
        .dot-bg {
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Cloud decoration */
        .cloud {
            position: absolute;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Progress bar */
        .progress-bar {
            background: linear-gradient(90deg, #FFD93D, #FF8FAB);
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Card hover */
        .lesson-card {
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
        }
        .lesson-card:hover {
            transform: translateY(-6px) rotate(-0.5deg);
        }

        /* Badge lock */
        .locked { filter: grayscale(1) brightness(0.7); opacity: 0.5; }

        /* Custom checkbox bounce */
        .bounce-in { animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>

        const playSuccess = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * 0.1 + 0.02);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.1 + 0.2);
                    osc.start(ctx.currentTime + i * 0.1);
                    osc.stop(ctx.currentTime + i * 0.1 + 0.2);

                gain.gain.setValueAtTime(0.1, ctx.currentTime);

                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                osc.start(); osc.stop(ctx.currentTime + 0.05);
            } catch(e){}
        };

        const speak = (text, lang='vi-VN') => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            msg.rate = lang === 'en-US' ? 0.85 : 0.75;
            msg.pitch = 1.15;
            msg.volume = 1;
            const voices = window.speechSynthesis.getVoices();

            if (lang === 'vi-VN') {
                // Ưu tiên giọng tiếng Việt xịn
                const viVoice = voices.find(v => v.lang === 'vi-VN' || v.lang === 'vi_VN')
                    || voices.find(v => v.lang.toLowerCase().startsWith('vi'));
                if (viVoice) {
                    msg.voice = viVoice;
                } else {
                    // Không có giọng tiếng Việt → không ép dùng giọng tiếng Anh (vì đọc sai bét)
                    // Để trình duyệt tự chọn, hoặc tìm giọng đa ngôn ngữ
                    const multiVoice = voices.find(v => v.name.toLowerCase().includes('google'))
                        || voices.find(v => v.default);
                    if (multiVoice) msg.voice = multiVoice;
                }
            } else {
                const enVoice = voices.find(v => v.lang === 'en-US')
                    || voices.find(v => v.lang.toLowerCase().startsWith('en'));
                if (enVoice) msg.voice = enVoice;
            }
            window.speechSynthesis.speak(msg);
        };

        // Đọc chữ cái tiếng Việt - chỉ đọc âm thuần tiếng Việt
        // Ví dụ: B → "bờ", C → "cờ", A → "a"
        const speakVnLetter = (letter) => {
            const p = VN_LETTER_PRONOUNCE[letter];
            if (!p) { speak(letter); return; }
            speak(p.sound);
        };

        // Storage
        const STORAGE_KEY = 'be-hoc-gioi-v2';
        const loadState = () => {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY));

            } catch { return { name:'', avatar:'🦁', stars:0, completed:[], bestStreak:0, badges:[] }; }
        };
        const saveState = (s) => {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e){}
        };

                                    strokeDasharray={`${2 * Math.PI * 50}`}

                                <defs>

                                    <div className="display-font text-2xl text-orange-500">{pct}%</div>
                                    <div className="text-xs text-gray-500 font-bold">Tiến độ</div>

        // Lesson Card
        function LessonCard({ lesson, index, completed, onClick }) {

                <button onClick={onClick}
                    style={{animationDelay: `${index * 60}ms`}}

                    {completed && (

        // Result Screen (sau khi hoàn thành)
        function ResultScreen({ score, total, stars, onContinue, onHome }) {

            return (

        // Game Header (khi đang chơi)
        function GameHeader({ title, onBack, progress, lives }) {
            return (
                <div className="max-w-4xl mx-auto flex items-center gap-3 mb-6">
                    <button onClick={onBack} className="bg-white rounded-2xl w-12 h-12 flex items-center justify-center text-2xl chunky-shadow-sm btn-3d border-gray-200 font-bold">

                    </button>
                    <div className="flex-1 bg-white rounded-full h-5 chunky-shadow-sm border-2 border-white overflow-hidden p-0.5">

                    </div>
                    {lives !== undefined && (
                        <div className="flex gap-1">
                            {[...Array(3)].map((_,i) => (
                                <span key={i} className="text-2xl">{i < lives ? '❤️' : '🤍'}</span>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ============================================================
        // GAME: ALPHABET VN
        // ============================================================
        function AlphabetGame({ lesson, onComplete, onBack }) {
            const chars = useMemo(() => lesson.range ? ALPHABET_VN.slice(lesson.range[0], lesson.range[1]) : ALPHABET_VN, []);
            const [qIdx, setQIdx] = useState(0);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [options, setOptions] = useState([]);
            const [done, setDone] = useState(false);

            const total = chars.length;
            const current = chars[qIdx];

            useEffect(() => {
                if (qIdx >= total) { setDone(true); return; }
                const others = ALPHABET_VN.filter(c => c !== current);
                const wrong = shuffle(others).slice(0, 3);
                setOptions(shuffle([current, ...wrong]));
                setSelected(null);
                setIsCorrect(null);
                const t = setTimeout(() => speakVnLetter(current), 400);
                return () => clearTimeout(t);
            }, [qIdx]);

            const handlePick = (c) => {
                if (selected) return;
                setSelected(c);
                if (c === current) {
                    setIsCorrect(true);
                    setScore(s => s + 1);
                    setStreak(s => s + 1);
                    playSuccess();
                    confetti({ particleCount: 60, spread: 60, origin: { y: 0.7 } });
                    setTimeout(() => setQIdx(i => i + 1), 1200);
                } else {
                    setIsCorrect(false);
                    setStreak(0);
                    playError();
                    setTimeout(() => { setSelected(null); setIsCorrect(null); }, 800);
                }
            };

            if (done) {
                const stars = score === total ? 3 : score >= total * 0.7 ? 2 : 1;
                return <ResultScreen score={score} total={total} stars={stars}
                    onContinue={() => onComplete({ score, total, streak })}
                    onHome={() => { onComplete({ score, total, streak }); onBack(); }}/>;
            }

            const image = ALPHABET_IMAGES[current];

            return (
                <div className="min-h-screen p-4 sm:p-6">
                    <GameHeader title={lesson.title} onBack={onBack} progress={(qIdx/total)*100} />
                    <div className="max-w-3xl mx-auto pop">
                        <div className="bg-white rounded-[40px] p-6 sm:p-10 chunky-shadow border-4 border-pink-100 relative overflow-hidden">
                            <div className="absolute top-4 right-6 bg-pink-100 text-pink-500 px-3 py-1 rounded-full text-sm font-bold">
                                {qIdx + 1}/{total}
                            </div>

                            <h2 className="display-font text-2xl text-gray-700 text-center mb-2">Đây là chữ gì nhỉ?</h2>
                            <p className="text-center text-gray-400 mb-6">Bé hãy chọn chữ đúng nhé!</p>

                            <div className="flex flex-col sm:flex-row items-center justify-center gap-6 mb-8">
                                <div className="relative">
                                    <div className="bg-gradient-to-br from-pink-100 to-rose-100 w-44 h-44 sm:w-56 sm:h-56 rounded-[40px] flex items-center justify-center border-4 border-pink-200 chunky-shadow-sm">
                                        <span className="display-font text-[8rem] sm:text-[10rem] bg-gradient-to-br from-pink-500 to-rose-500 bg-clip-text text-transparent leading-none">{current}</span>
                                    </div>
                                    <button onClick={()=>speakVnLetter(current)}
                                        className="absolute -bottom-3 -right-3 w-14 h-14 bg-blue-500 text-white rounded-full text-2xl chunky-shadow-sm btn-3d border-blue-700">
                                        🔊
                                    </button>
                                    {VN_LETTER_PRONOUNCE[current] && (
                                        <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-4 py-1 rounded-full border-2 border-pink-300 chunky-shadow-sm whitespace-nowrap">
                                            <span className="display-font text-pink-500 text-sm">đọc là "{VN_LETTER_PRONOUNCE[current].sound}"</span>
                                        </div>
                                    )}
                                </div>

                                {image && (
                                    <div className="bg-yellow-50 rounded-3xl p-4 text-center border-2 border-yellow-200">
                                        <div className="text-6xl mb-1 float">{image.emoji}</div>

                    ans = x + y;

                    ans = x - y;

                setA(x); setB(y); setAnswer(ans);

                    const others = topic.words.filter(w => w.en !== c.en);
                    const wrong = shuffle(others).slice(0, 3);
                    setCurrent(c);
                    setOptions(shuffle([c, ...wrong]));
                    setSelected(null); setIsCorrect(null);

                setSelected(word.en);

            // Phase: Quiz
            return (
                <div className="min-h-screen p-4 sm:p-6">
                    <GameHeader title={lesson.title} onBack={onBack} progress={(qIdx/totalQuestions)*100} />
                    <div className="max-w-3xl mx-auto pop">
                        <div className="bg-white rounded-[40px] p-6 sm:p-10 chunky-shadow border-4 border-orange-100 relative">

                            <p className="text-center text-gray-400 mb-6">Bé chọn từ tiếng Anh đúng nhé!</p>

                            <div className="flex justify-center mb-8">

                                    {current.emoji}

                            <div className="text-center mb-6">
                                <div className="inline-block bg-gray-50 px-4 py-2 rounded-full text-gray-600">

                                    return (
                                        <button key={w.en} onClick={()=>handlePick(w)}
                                            disabled={!!selected}

        // ============================================================
        // GAME: MEMORY MATCH - TRÒ CHƠI GHI NHỚ
        // ============================================================
        const MEMORY_DECKS = {
            animals: {
                name: 'Động Vật',
                gradient: 'from-violet-400 to-purple-500',
                borderColor: 'border-violet-100',
                bgColor: 'bg-violet-500',
                accentColor: 'text-violet-500',
                pairs: [

                    { id:'dog',   emoji:'🐶', label:'Chó' },
                    { id:'rabbit',emoji:'🐰', label:'Thỏ' },
                    { id:'bear',  emoji:'🐻', label:'Gấu' },
                    { id:'fox',   emoji:'🦊', label:'Cáo' },

                    { id:'panda', emoji:'🐼', label:'Gấu Trúc' },

                ]
            },
            fruits: {

                pairs: [
                    { id:'apple',     emoji:'🍎', label:'Táo' },
                    { id:'banana',    emoji:'🍌', label:'Chuối' },
                    { id:'grape',     emoji:'🍇', label:'Nho' },
                    { id:'watermelon',emoji:'🍉', label:'Dưa Hấu' },
                    { id:'strawberry',emoji:'🍓', label:'Dâu' },
                    { id:'pineapple', emoji:'🍍', label:'Dứa' },

                ]
            },
            // Deck đặc biệt: ghép hình với TÊN GỌI đầy đủ của con vật/đồ vật
            // Ví dụ: 🐱 ghép với "Mèo" (không phải chữ M)
            words: {
                name: 'Hình & Từ',
                gradient: 'from-purple-400 to-indigo-500',
                borderColor: 'border-indigo-100',
                bgColor: 'bg-indigo-500',
                accentColor: 'text-indigo-500',
                mode: 'image-word',
                pairs: [
                    { id:'cat',   emoji:'🐱', word:'Mèo' },
                    { id:'dog',   emoji:'🐶', word:'Chó' },
                    { id:'fish',  emoji:'🐟', word:'Cá' },
                    { id:'cow',   emoji:'🐄', word:'Bò' },
                    { id:'gaa',   emoji:'🐓', word:'Gà' },
                    { id:'duck',  emoji:'🦆', word:'Vịt' },
                    { id:'apple', emoji:'🍎', word:'Táo' },
                    { id:'car',   emoji:'🚗', word:'Ô Tô' },
                ]
            }
        };

        function MemoryMatchGame({ lesson, onComplete, onBack }) {
            const deck = MEMORY_DECKS[lesson.deck];
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]); // indexes đang lật
            const [matched, setMatched] = useState([]); // ids đã match
            const [moves, setMoves] = useState(0);
            const [startTime] = useState(Date.now());
            const [elapsed, setElapsed] = useState(0);
            const [done, setDone] = useState(false);
            const [wrongPair, setWrongPair] = useState(null); // indexes sai để shake
            const lockRef = useRef(false);

            // Tạo bộ thẻ (gấp đôi lên và xáo trộn)
            useEffect(() => {
                let deckCards;
                if (deck.mode === 'image-word') {
                    // Mỗi cặp: thẻ HÌNH + thẻ TỪ (ví dụ 🐱 + "Mèo")
                    deckCards = deck.pairs.flatMap((p, i) => ([
                        { uid: `${i}-img`,  pairId: p.id, type:'image', content: p.emoji, label: p.word },
                        { uid: `${i}-word`, pairId: p.id, type:'word',  content: p.word,  label: p.word },
                    ]));
                } else {
                    // Cặp giống hệt nhau (hình & hình)
                    deckCards = deck.pairs.flatMap((p, i) => ([
                        { uid: `${i}-a`, pairId: p.id, type:'emoji', content: p.emoji, label: p.label },
                        { uid: `${i}-b`, pairId: p.id, type:'emoji', content: p.emoji, label: p.label },
                    ]));
                }
                setCards(shuffle(deckCards));
            }, []);

            // Timer
            useEffect(() => {
                if (done) return;
                const t = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 500);
                return () => clearInterval(t);
            }, [done]);

            // Kiểm tra hoàn thành
            useEffect(() => {
                if (cards.length > 0 && matched.length === deck.pairs.length) {
                    setTimeout(() => setDone(true), 600);
                }
            }, [matched, cards]);

            const handleFlip = (idx) => {
                if (lockRef.current) return;
                if (flipped.includes(idx)) return;
                if (matched.includes(cards[idx].pairId)) return;
                if (flipped.length >= 2) return;

                playClick();
                const newFlipped = [...flipped, idx];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    lockRef.current = true;
                    setMoves(m => m + 1);
                    const [a, b] = newFlipped;
                    if (cards[a].pairId === cards[b].pairId) {
                        // Match!
                        setTimeout(() => {
                            playSuccess();
                            setMatched(m => [...m, cards[a].pairId]);
                            setFlipped([]);
                            lockRef.current = false;
                            confetti({ particleCount: 40, spread: 50, origin: { y: 0.6 } });
                            // Deck Hình & Từ: đọc từ tiếng Việt đầy đủ (ví dụ "Con Mèo")
                            if (deck.mode === 'image-word') {
                                const pair = deck.pairs.find(p => p.id === cards[a].pairId);
                                if (pair) speak(pair.word);
                            }
                        }, 500);
                    } else {
                        // Sai
                        setWrongPair([a, b]);
                        playError();
                        setTimeout(() => {
                            setFlipped([]);
                            setWrongPair(null);
                            lockRef.current = false;
                        }, 1000);
                    }
                }
            };

            const progress = (matched.length / deck.pairs.length) * 100;
            const fmtTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            if (done) {
                // Scoring: càng ít moves càng nhiều sao
                const perfectMoves = deck.pairs.length;
                const ratio = perfectMoves / Math.max(moves, perfectMoves);
                const stars = ratio >= 0.8 ? 3 : ratio >= 0.6 ? 2 : 1;
                const score = stars;
                return <ResultScreen score={score} total={3} stars={stars}
                    onContinue={() => onComplete({ score: deck.pairs.length, total: deck.pairs.length, streak: 0 })}
                    onHome={() => { onComplete({ score: deck.pairs.length, total: deck.pairs.length, streak: 0 }); onBack(); }}/>;
            }

            return (
                <div className="min-h-screen p-4 sm:p-6">
                    <GameHeader title={lesson.title} onBack={onBack} progress={progress} />
                    <div className="max-w-4xl mx-auto pop">
                        <div className={`bg-white rounded-[40px] p-4 sm:p-8 chunky-shadow border-4 ${deck.borderColor} relative`}>
                            {/* Stats */}
                            <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
                                <div className="flex items-center gap-3">
                                    <div className={`text-4xl`}>{lesson.icon}</div>
                                    <div>
                                        <h2 className={`display-font text-xl ${deck.accentColor}`}>Tìm các cặp giống nhau!</h2>
                                        <p className="text-sm text-gray-500">Bé lật 2 thẻ cùng một lúc</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <div className="bg-yellow-50 border-2 border-yellow-200 rounded-2xl px-3 py-2 text-center">
                                        <div className="text-xs text-gray-500 font-bold">LƯỢT</div>
                                        <div className="display-font text-xl text-orange-500">{moves}</div>
                                    </div>
                                    <div className="bg-blue-50 border-2 border-blue-200 rounded-2xl px-3 py-2 text-center">
                                        <div className="text-xs text-gray-500 font-bold">GIỜ</div>
                                        <div className="display-font text-xl text-blue-500">{fmtTime(elapsed)}</div>
                                    </div>
                                    <div className="bg-green-50 border-2 border-green-200 rounded-2xl px-3 py-2 text-center">
                                        <div className="text-xs text-gray-500 font-bold">CẶP</div>
                                        <div className="display-font text-xl text-green-500">{matched.length}/{deck.pairs.length}</div>
                                    </div>
                                </div>
                            </div>

                            {/* Cards grid */}
                            <div className="grid grid-cols-4 gap-2 sm:gap-3 mt-4">
                                {cards.map((card, idx) => {
                                    const isFlipped = flipped.includes(idx) || matched.includes(card.pairId);
                                    const isMatched = matched.includes(card.pairId);
                                    const isWrong = wrongPair && wrongPair.includes(idx);
                                    return (
                                        <button key={card.uid}
                                            onClick={() => handleFlip(idx)}
                                            disabled={isMatched}
                                            className={`aspect-square rounded-2xl sm:rounded-3xl relative transition-all duration-300 ${isWrong ? 'shake' : ''} ${isFlipped ? '' : 'hover:scale-105'}`}
                                            style={{ perspective: '600px' }}>
                                            <div className={`absolute inset-0 transition-transform duration-500`}
                                                style={{
                                                    transformStyle: 'preserve-3d',
                                                    transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)'
                                                }}>
                                                {/* Mặt sau thẻ (hỏi) */}
                                                <div className={`absolute inset-0 bg-gradient-to-br ${deck.gradient} rounded-2xl sm:rounded-3xl flex items-center justify-center chunky-shadow-sm border-4 border-white`}
                                                    style={{ backfaceVisibility: 'hidden' }}>
                                                    <div className="text-3xl sm:text-5xl text-white/80">?</div>
                                                </div>
                                                {/* Mặt trước (nội dung) */}
                                                <div className={`absolute inset-0 rounded-2xl sm:rounded-3xl flex items-center justify-center chunky-shadow-sm border-4 ${isMatched ? 'bg-gradient-to-br from-green-100 to-emerald-100 border-green-300' : 'bg-white border-yellow-200'}`}
                                                    style={{ backfaceVisibility: 'hidden', transform: 'rotateY(180deg)' }}>
                                                    {card.type === 'word' ? (
                                                        <span className="display-font text-2xl sm:text-3xl text-center px-2 bg-gradient-to-br from-indigo-500 to-purple-500 bg-clip-text text-transparent leading-tight">{card.content}</span>
                                                    ) : (
                                                        <span className="text-4xl sm:text-6xl">{card.content}</span>
                                                    )}
                                                    {isMatched && (
                                                        <div className="absolute top-1 right-1 bg-green-500 text-white rounded-full w-5 h-5 sm:w-6 sm:h-6 flex items-center justify-center text-xs font-bold">✓</div>
                                                    )}
                                                </div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Matched labels */}
                            {matched.length > 0 && (
                                <div className="mt-6 pt-4 border-t-2 border-dashed border-gray-200">
                                    <div className="text-xs font-bold text-gray-400 mb-2 text-center">ĐÃ TÌM THẤY</div>
                                    <div className="flex flex-wrap gap-2 justify-center">
                                        {matched.map(id => {
                                            const p = deck.pairs.find(x => x.id === id);
                                            return (
                                                <div key={id} className="bg-green-50 border-2 border-green-200 rounded-full px-3 py-1 text-sm font-bold text-green-700 flex items-center gap-1 bounce-in">
                                                    <span>{p.emoji}</span>
                                                    <span>{p.word || p.label}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // MAIN APP
        // ============================================================
        function App() {
            const [profile, setProfile] = useState(loadState);
            const [activeLesson, setActiveLesson] = useState(null);
            const [showProfile, setShowProfile] = useState(false);
            const [showBadges, setShowBadges] = useState(false);
            const [subject, setSubject] = useState('all');
            const [newBadge, setNewBadge] = useState(null);

            // Init: show profile if no name
            useEffect(() => {
                if (!profile.name) setShowProfile(true);
            }, []);

            useEffect(() => saveState(profile), [profile]);

            // preload voices
            useEffect(() => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices();
                    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
                }
            }, []);

            const handleComplete = (lessonId) => ({ score, total, streak }) => {
                setProfile(p => {
                    const np = { ...p };
                    if (!np.completed.includes(lessonId)) {
                        np.completed = [...np.completed, lessonId];
                    }
                    // Stars: 5 base + 1 per correct
                    const earnedStars = 5 + score;
                    np.stars = p.stars + earnedStars;
                    np.bestStreak = Math.max(p.bestStreak, streak || 0);
                    // Check badges
                    const newlyEarned = BADGES.filter(b => !np.badges.includes(b.id) && b.req(np));
                    if (newlyEarned.length > 0) {
                        np.badges = [...np.badges, ...newlyEarned.map(b => b.id)];
                        setTimeout(() => setNewBadge(newlyEarned[0]), 1500);
                    }
                    return np;
                });
            };

            // Render active game
            if (activeLesson) {
                const commonProps = {
                    lesson: activeLesson,
                    onBack: () => setActiveLesson(null),
                    onComplete: (result) => { handleComplete(activeLesson.id)(result); },
                };
                switch (activeLesson.type) {
                    case 'alphabet-vn': return <AlphabetGame {...commonProps} />;
                    case 'word-match': return <WordMatchGame {...commonProps} />;
                    case 'counting': return <CountingGame {...commonProps} />;
                    case 'addition':
                    case 'subtraction': return <MathOpGame {...commonProps} />;
                    case 'compare': return <CompareGame {...commonProps} />;
                    case 'shapes': return <ShapesGame {...commonProps} />;
                    case 'alphabet-en': return <EnglishAlphabetGame {...commonProps} />;
                    case 'vocab': return <EnglishVocabGame {...commonProps} />;
                    case 'memory': return <MemoryMatchGame {...commonProps} />;
                    default: return null;
                }
            }

            const filtered = subject === 'all' ? LESSONS : LESSONS.filter(l => l.subject === subject);

            return (
                <div className="relative min-h-screen">
                    <Clouds />

                    <Header profile={profile}
                        onProfileClick={()=>setShowProfile(true)}
                        onBadgesClick={()=>setShowBadges(true)}
                        onHome={()=>setSubject('all')} />

                    <main className="max-w-7xl mx-auto p-4 sm:p-6 relative z-10">
                        <ProgressStats profile={profile} />
                        <SubjectTabs active={subject} onChange={setSubject} />

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                            {filtered.map((l, i) => (
                                <LessonCard key={l.id} lesson={l} index={i}
                                    completed={profile.completed.includes(l.id)}
                                    onClick={()=>{ setActiveLesson(l); playClick(); }}/>
                            ))}
                        </div>

                        <footer className="mt-20 pb-10 text-center">
                            <div className="flex items-center justify-center gap-3 mb-4">
                                <div className="h-px w-12 bg-gradient-to-r from-transparent to-pink-300"></div>
                                <div className="w-10 h-10 bg-gradient-to-br from-pink-500 via-rose-500 to-orange-500 rounded-xl flex items-center justify-center text-lg chunky-shadow-sm">
                                    <span className="text-white">📚</span>
                                </div>
                                <div className="h-px w-12 bg-gradient-to-l from-transparent to-pink-300"></div>
                            </div>
                            <p className="brand-font text-xl bg-gradient-to-r from-pink-500 via-rose-500 to-orange-500 bg-clip-text text-transparent">PreSchool</p>
                            <p className="text-xs uppercase tracking-[0.25em] text-gray-400 font-bold mt-1">Bé Học Giỏi · Vui Khoẻ Mỗi Ngày</p>
                            <p className="text-xs text-gray-400 mt-3">Chương trình học dành cho bé 4-6 tuổi · Phát triển toàn diện Tiếng Việt, Toán, Tiếng Anh</p>
                        </footer>
                    </main>

                    {showProfile && <ProfileModal profile={profile} onSave={(p)=>{setProfile(p); setShowProfile(false);}} onClose={()=>setShowProfile(false)} />}
                    {showBadges && <BadgesModal profile={profile} onClose={()=>setShowBadges(false)} />}
                    {newBadge && <BadgeToast badge={newBadge} onClose={()=>setNewBadge(null)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
