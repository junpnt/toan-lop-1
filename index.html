<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Toán - Luyện Toán Lớp 1</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            background:#FFF9E6;
            font-family:'Segoe UI',Tahoma,Arial,sans-serif;
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:16px;overflow-x:hidden;
        }
        .star-bg{position:fixed;pointer-events:none;opacity:.15;z-index:0;font-size:80px;line-height:1;}
        .card{
            width:100%;max-width:440px;background:#fff;
            border-radius:40px;
            box-shadow:0 20px 0 0 #E6E6E6;
            padding:32px;border:4px solid #FFD700;
            position:relative;z-index:10;
            animation:slideUp .3s ease;
        }
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
        @keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}

        /* Buttons */
        .btn{
            width:100%;padding:20px;border:none;border-radius:20px;
            font-size:20px;font-weight:700;cursor:pointer;
            transition:transform .1s,box-shadow .1s;font-family:inherit;
        }
        .btn:active{transform:translateY(4px);}
        .btn-teal{background:#4ECDC4;color:#fff;box-shadow:0 6px 0 0 #36918A;}
        .btn-teal:active{box-shadow:0 2px 0 0 #36918A;}
        .btn-red{background:#FF6B6B;color:#fff;box-shadow:0 6px 0 0 #D64545;}
        .btn-red:active{box-shadow:0 2px 0 0 #D64545;}
        .btn-gray{background:#D1D5DB;color:#fff;box-shadow:0 6px 0 0 #9CA3AF;cursor:not-allowed;}
        .btn-option{
            background:#fff;color:#374151;border:4px solid #F3F4F6;
            border-radius:16px;padding:16px;font-size:18px;font-weight:700;
            cursor:pointer;transition:border-color .15s,background .15s;
            font-family:inherit;width:100%;
        }
        .btn-option:hover{border-color:#4ECDC4;}

        /* Input */
        .input-text{
            width:100%;padding:16px 24px;background:#F9FAFB;
            border:4px solid #E5E7EB;border-radius:20px;
            font-size:20px;font-weight:700;font-family:inherit;
            outline:none;transition:border-color .2s;
        }
        .input-text:focus{border-color:#4ECDC4;}
        .input-number{
            width:100%;padding:20px;text-align:center;
            font-size:48px;font-weight:700;background:#F9FAFB;
            border:4px solid #E5E7EB;border-radius:24px;
            font-family:inherit;outline:none;
            -moz-appearance:textfield;
        }
        .input-number:focus{border-color:#4ECDC4;}
        .input-number::-webkit-inner-spin-button,
        .input-number::-webkit-outer-spin-button{-webkit-appearance:none;}

        /* Avatar grid */
        .avatar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
        .avatar-btn{
            padding:12px;border-radius:16px;border:4px solid transparent;
            background:#F9FAFB;cursor:pointer;
            display:flex;flex-direction:column;align-items:center;gap:4px;
            transition:border-color .15s,background .15s;font-family:inherit;
        }
        .avatar-btn.active{border-color:#4ECDC4;background:#E0F7F5;}
        .avatar-emoji{font-size:36px;}
        .avatar-label{font-size:11px;font-weight:700;color:#6B7280;}

        /* Question */
        .question-box{
            text-align:center;padding:36px 20px;background:#F8F9FA;
            border-radius:32px;border:4px dashed #E5E7EB;
        }
        .question-text{
            font-size:62px;font-weight:900;color:#1F2937;
            display:flex;align-items:center;justify-content:center;gap:14px;
        }
        .q-op{color:#FF6B6B;}
        .q-qm{color:#D1D5DB;}

        /* Comparison */
        .cmp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
        .cmp-btn{
            padding:20px;background:#fff;border:4px solid #E5E7EB;
            border-radius:16px;font-size:36px;font-weight:700;color:#374151;
            cursor:pointer;transition:border-color .15s;font-family:inherit;
        }
        .cmp-btn:hover{border-color:#4ECDC4;}

        /* Stats */
        .stats-bar{display:flex;justify-content:space-between;align-items:center;}
        .player-badge{display:flex;align-items:center;gap:8px;}
        .avatar-circle{
            width:40px;height:40px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:20px;border:2px solid #fff;background:#FEF3C7;
        }
        .player-name{font-weight:700;color:#374151;font-size:15px;}
        .stat-pills{display:flex;gap:8px;}
        .pill{
            display:flex;align-items:center;gap:4px;
            padding:4px 10px;border-radius:12px;
            font-weight:700;font-size:14px;border:2px solid;
        }
        .pill-lives{background:#FFF1F2;border-color:#FECDD3;color:#E11D48;}
        .pill-score{background:#FEFCE8;border-color:#FEF08A;color:#CA8A04;}

        /* Timer bar */
        .timer-wrap{height:8px;background:#E5E7EB;border-radius:99px;overflow:hidden;}
        .timer-bar{height:100%;background:#4ECDC4;border-radius:99px;transition:width .9s linear,background .3s;}
        .timer-bar.warn{background:#FF6B6B;}

        /* Feedback */
        .feedback-overlay{
            position:absolute;inset:0;
            display:flex;align-items:center;justify-content:center;
            background:rgba(255,255,255,.93);border-radius:36px;
            z-index:20;animation:popIn .2s ease;
        }
        .feedback-content{text-align:center;}
        .feedback-icon{font-size:80px;}
        .feedback-text{font-size:26px;font-weight:700;margin-top:8px;}
        .fc-correct{color:#4ECDC4;}
        .fc-wrong{color:#FF6B6B;}

        /* Spacing */
        .sy>*+*{margin-top:16px;}
        .sy-sm>*+*{margin-top:12px;}
        .tc{text-align:center;}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .footer-text{margin-top:24px;color:#9CA3AF;font-weight:500;font-size:14px;z-index:10;}

        #confetti-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:100;}
    </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<span class="star-bg" style="top:10px;left:10px;">⭐</span>
<span class="star-bg" style="bottom:10px;right:10px;font-size:64px;">⭐</span>

<div class="card" id="app"></div>
<p class="footer-text">Học toán thật vui cùng Bé Học Toán!</p>

<script>
// ── Constants ────────────────────────────────────────────────────────
const AVATARS=[
    {id:'dog',   emoji:'🐶',label:'Cún con'},
    {id:'cat',   emoji:'🐱',label:'Mèo nhỏ'},
    {id:'rabbit',emoji:'🐰',label:'Thỏ trắng'},
    {id:'panda', emoji:'🐼',label:'Gấu trúc'},
    {id:'lion',  emoji:'🦁',label:'Sư tử'},
    {id:'frog',  emoji:'🐸',label:'Ếch xanh'},
];

// ── State ────────────────────────────────────────────────────────────
const S={
    screen:'start',
    name:'', avatar:AVATARS[0],
    question:null,
    quizQs:[], quizIdx:0,
    score:0, lives:3, timeLeft:30,
    feedback:null,          // null | 'correct' | 'wrong'
    mode:'endless',         // 'endless' | 'quiz'
    timer:null,
    opts:[],                // current question options (safe reference for onclick)
};

// ── Confetti ─────────────────────────────────────────────────────────
function confetti(big){
    const cv=document.getElementById('confetti-canvas');
    const cx=cv.getContext('2d');
    cv.width=innerWidth; cv.height=innerHeight;
    const n=big?160:60;
    const cols=['#FF6B6B','#4ECDC4','#FFD700','#A8E063','#FF8C94','#7C6FFF'];
    const ps=Array.from({length:n},()=>({
        x:cv.width*.5+(Math.random()-.5)*200,
        y:cv.height*(big?.6:.75),
        vx:(Math.random()-.5)*(big?18:10),
        vy:-(Math.random()*(big?14:8)+3),
        c:cols[Math.random()*cols.length|0],
        s:Math.random()*8+4,
        a:1, r:Math.random()*360
    }));
    let raf;
    (function draw(){
        cx.clearRect(0,0,cv.width,cv.height);
        let alive=false;
        ps.forEach(p=>{
            p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.a-=.014;p.r+=4;
            if(p.a<=0)return; alive=true;
            cx.save();cx.globalAlpha=p.a;cx.fillStyle=p.c;
            cx.translate(p.x,p.y);cx.rotate(p.r*Math.PI/180);
            cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore();
        });
        if(alive)raf=requestAnimationFrame(draw);
        else cx.clearRect(0,0,cv.width,cv.height);
    })();
}

// ── Question generator ───────────────────────────────────────────────
function genQ(){
    if(Math.random()>.7){
        const a=Math.floor(Math.random()*100);
        const b=Math.floor(Math.random()*100);
        const ans=a>b?'>':a<b?'<':'=';
        return{type:'cmp',a,b,operator:'?',answer:ans,options:['>','<','=']};
    }
    const op=Math.random()>.5?'+':'-';
    let a,b,ans;
    if(op==='+'){a=Math.floor(Math.random()*90)+1;b=Math.floor(Math.random()*(100-a))+1;ans=a+b;}
    else{a=Math.floor(Math.random()*99)+2;b=Math.floor(Math.random()*(a-1))+1;ans=a-b;}
    const opts=[ans];
    while(opts.length<4){const w=ans+Math.floor(Math.random()*10)-5;if(w>=0&&w<=100&&!opts.includes(w))opts.push(w);}
    opts.sort(()=>Math.random()-.5);
    return{type:'calc',a,b,operator:op,answer:ans,options:opts};
}

// ── Timer ────────────────────────────────────────────────────────────
function stopTimer(){clearInterval(S.timer);S.timer=null;}
function startTimer(onExpire){
    stopTimer();S.timeLeft=30;
    S.timer=setInterval(()=>{
        S.timeLeft--;
        updateTimerBar();
        if(S.timeLeft<=0){stopTimer();onExpire();}
    },1000);
}
function updateTimerBar(){
    const b=document.getElementById('tbar');
    const l=document.getElementById('tlbl');
    if(b){b.style.width=(S.timeLeft/30*100)+'%';b.className='timer-bar'+(S.timeLeft<=10?' warn':'');}
    if(l)l.textContent='⏳ '+S.timeLeft+'s';
}

// ── Game logic ───────────────────────────────────────────────────────
function gameOver(){
    stopTimer();
    S.screen=S.mode==='endless'?'gameover':'quiz-result';
    render();
    if(S.screen==='quiz-result')confetti(true);
}

function nextEndlessQ(){
    S.question=genQ(); S.feedback=null; S.opts=S.question.options;
    startTimer(()=>{
        S.lives--;
        if(S.lives<=0){gameOver();return;}
        nextEndlessQ(); render();
    });
    render();
}

function startEndless(){
    S.mode='endless';S.score=0;S.lives=3;S.screen='playing';
    nextEndlessQ();
}

function startQuiz(){
    S.mode='quiz';S.quizQs=Array.from({length:10},genQ);
    S.quizIdx=0;S.score=0;S.screen='quiz';
    nextQuizQ();
}
function nextQuizQ(){
    S.feedback=null; S.opts=S.quizQs[S.quizIdx].options;
    startTimer(()=>advanceQuiz());
    render();
}
function advanceQuiz(){S.quizIdx<9?(S.quizIdx++,nextQuizQ()):gameOver();}

// Called from inline onclick
function checkAns(val){
    if(S.feedback)return;
    const q=S.question; if(!q)return;
    stopTimer();
    const ok=val.toString()===q.answer.toString();
    S.feedback=ok?'correct':'wrong';
    if(ok){S.score++;confetti(true);}else{S.lives--;}
    render();
    setTimeout(()=>{
        if(ok||S.lives>0)nextEndlessQ(); else gameOver();
    },1000);
}
function checkEndlessTyped(){
    const v=document.getElementById('ans').value.trim();
    if(v)checkAns(v);
}
function checkQuizAns(i){
    if(S.feedback)return;
    stopTimer();
    const q=S.quizQs[S.quizIdx];
    const ok=S.opts[i].toString()===q.answer.toString();
    S.feedback=ok?'correct':'wrong';
    if(ok){S.score++;confetti(false);}
    render();
    setTimeout(advanceQuiz,800);
}

// ── Helpers ───────────────────────────────────────────────────────────
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function feedbackHTML(){
    if(!S.feedback)return'';
    const ok=S.feedback==='correct';
    return`<div class="feedback-overlay">
        <div class="feedback-content ${ok?'fc-correct':'fc-wrong'}">
            <div class="feedback-icon">${ok?'✅':'❌'}</div>
            <div class="feedback-text">${ok?'ĐÚNG RỒI! 🎉':'THỬ LẠI NHÉ! 💪'}</div>
        </div></div>`;
}

// ── Render ────────────────────────────────────────────────────────────
function render(){
    const app=document.getElementById('app');

    // ── Start ──
    if(S.screen==='start'){
        app.innerHTML=`<div class="sy tc">
            <h1 style="font-size:44px;font-weight:900;color:#FF6B6B;">Bé Học Toán! 🎨</h1>
            <div style="font-size:80px;animation:bounce 1s infinite;">🦁</div>
            <p style="font-size:18px;color:#6B7280;font-weight:600;">Luyện tập cộng trừ trong phạm vi 100!</p>
            <button class="btn btn-teal" style="font-size:28px;padding:24px;"
                onclick="S.screen='setup';render()">BẮT ĐẦU</button>
        </div>`;
        return;
    }

    // ── Setup ──
    if(S.screen==='setup'){
        app.innerHTML=`<div class="sy">
            <div class="tc">
                <h2 style="font-size:28px;font-weight:900;color:#FF6B6B;">Chào bé yêu! 👋</h2>
                <p style="color:#9CA3AF;margin-top:6px;">Nhập tên và chọn bạn đồng hành nhé</p>
            </div>
            <input class="input-text" id="nminput" type="text" placeholder="Tên của bé..."
                value="${esc(S.name)}"
                oninput="S.name=this.value;_refreshBtns()">
            <div class="avatar-grid">
                ${AVATARS.map(a=>`<button class="avatar-btn${a.id===S.avatar.id?' active':''}"
                    onclick="S.avatar=AVATARS.find(x=>x.id==='${a.id}');
                             document.querySelectorAll('.avatar-btn').forEach(b=>b.classList.remove('active'));
                             this.classList.add('active')">
                    <span class="avatar-emoji">${a.emoji}</span>
                    <span class="avatar-label">${esc(a.label)}</span>
                </button>`).join('')}
            </div>
            <div class="g2">
                <button id="btnE" class="btn ${S.name.trim()?'btn-teal':'btn-gray'}"
                    onclick="if(S.name.trim())startEndless()" style="font-size:18px;">VÔ TẬN ♾️</button>
                <button id="btnQ" class="btn ${S.name.trim()?'btn-red':'btn-gray'}"
                    onclick="if(S.name.trim())startQuiz()" style="font-size:18px;">LÀM ĐỀ 📝</button>
            </div>
        </div>`;
        document.getElementById('nminput').focus();
        return;
    }

    // ── Playing (endless) ──
    if(S.screen==='playing'&&S.question){
        const q=S.question;
        const timerPct=S.timeLeft/30*100;
        const ansArea=q.type==='cmp'
            ?`<div class="cmp-grid">
                ${['>','<','='].map((op,i)=>`<button class="cmp-btn"
                    onclick="checkAns('${op==='<'?'&lt;':op==='>'?'&gt;':op}')">${op}</button>`).join('')}
              </div>`
            :`<div class="sy-sm">
                <input class="input-number" type="number" id="ans" placeholder="???"
                    onkeydown="if(event.key==='Enter')checkEndlessTyped()">
                <button class="btn btn-red" style="font-size:22px;"
                    onclick="checkEndlessTyped()">KIỂM TRA</button>
              </div>`;
        app.innerHTML=`<div class="sy" style="position:relative;">
            <div class="stats-bar">
                <div class="player-badge">
                    <div class="avatar-circle">${S.avatar.emoji}</div>
                    <span class="player-name">${esc(S.name)}</span>
                </div>
                <div class="stat-pills">
                    <div class="pill pill-lives">❤️ ${S.lives}</div>
                    <div class="pill pill-score">🏆 ${S.score}</div>
                </div>
            </div>
            <div class="timer-wrap">
                <div class="timer-bar${S.timeLeft<=10?' warn':''}" id="tbar"
                    style="width:${timerPct}%"></div>
            </div>
            <div class="question-box">
                <div class="question-text">
                    <span>${q.a}</span>
                    <span class="q-op">${esc(q.operator)}</span>
                    <span>${q.b}</span>
                    ${q.type==='calc'?'<span class="q-qm">= ?</span>':''}
                </div>
            </div>
            ${ansArea}
            ${feedbackHTML()}
        </div>`;
        if(!S.feedback&&q.type==='calc'){
            const inp=document.getElementById('ans');
            if(inp)inp.focus();
        }
        return;
    }

    // ── Quiz ──
    if(S.screen==='quiz'){
        const q=S.quizQs[S.quizIdx];
        const timerPct=S.timeLeft/30*100;
        const opts=S.opts; // safe reference
        app.innerHTML=`<div class="sy" style="position:relative;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:700;color:#3B82F6;font-size:15px;">
                    Câu ${S.quizIdx+1} / 10 &nbsp;·&nbsp; Đúng: ${S.score}
                </span>
                <span id="tlbl" style="font-weight:700;color:#6B7280;">⏳ ${S.timeLeft}s</span>
            </div>
            <div class="timer-wrap">
                <div class="timer-bar${S.timeLeft<=10?' warn':''}" id="tbar"
                    style="width:${timerPct}%"></div>
            </div>
            <div class="question-box">
                <div class="question-text" style="font-size:52px;">
                    <span>${q.a}</span>
                    <span class="q-op">${esc(q.operator)}</span>
                    <span>${q.b}</span>
                    ${q.type==='calc'?'<span class="q-qm">= ?</span>':''}
                </div>
            </div>
            <div class="${opts.length===3?'cmp-grid':'g2'}">
                ${opts.map((op,i)=>`<button class="btn-option"
                    onclick="checkQuizAns(${i})">
                    ${'ABCD'[i]}. ${esc(String(op))}
                </button>`).join('')}
            </div>
            ${feedbackHTML()}
        </div>`;
        return;
    }

    // ── Game over / Quiz result ──
    if(S.screen==='gameover'||S.screen==='quiz-result'){
        const isQuiz=S.screen==='quiz-result';
        app.innerHTML=`<div class="sy tc">
            <div style="font-size:80px;">${isQuiz?'🏆':'⏰'}</div>
            <h2 style="font-size:28px;font-weight:700;color:#374151;">
                Giỏi quá, ${esc(S.name)}!
            </h2>
            <div style="background:#FEFCE8;padding:24px;border-radius:24px;border:2px solid #FEF08A;">
                <p style="font-size:17px;color:#9CA3AF;font-weight:700;">Kết quả của bé:</p>
                <p style="font-size:80px;font-weight:900;color:#CA8A04;">
                    ${S.score}${isQuiz?'<span style="font-size:40px;color:#9CA3AF;">/10</span>':''}
                </p>
            </div>
            <button class="btn btn-teal" style="font-size:22px;"
                onclick="S.screen='setup';render()">CHƠI LẠI ↺</button>
        </div>`;
        return;
    }
}

// Refresh start/stop buttons when name changes (without full re-render)
function _refreshBtns(){
    const has=S.name.trim();
    const e=document.getElementById('btnE');
    const q=document.getElementById('btnQ');
    if(e)e.className='btn '+(has?'btn-teal':'btn-gray');
    if(q)q.className='btn '+(has?'btn-red':'btn-gray');
}

// Fix: comparison checkAns passes decoded operators
// The cmp-btn onclick uses HTML entities for display but we need real chars for logic
// Override to always decode: rewrite cmp-btn onclick cleanly using data-attr
document.addEventListener('click',function(e){
    const b=e.target.closest('.cmp-btn');
    if(b){e.stopImmediatePropagation();checkAns(b.textContent.trim());}
},{capture:true});

// ── Init ──────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
